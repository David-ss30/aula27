<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>internal</title>
    <style>
     *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
     }

     body{
        border: 4px solid red;
        width: 100%;
        height: 100vh;

        display: flex;
        gap: 40px;
        justify-content: center;
        align-items: center;
        
     }
     .square {
        width: 800px;
        height: 800px;
        background-color: blue;

        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-direction: column;
        /* o jc obdece a direção do flex */
        
     }
     #circle{
        width: 800px;
        height: 800px;
        background-color: black;
        border-radius: 120px;
        
        display: flex;
        justify-content: space-evenly;
        align-items: end;
        flex-direction: column;
        
        }
       .rectangle{
            width: 200px;
            height: 200px;
            background-color: brown;
       }
       p{
        font-size: 22px;
        color: pink;
       }
     
    

    

    </style>
</head>
<body>
    <div class="square">
        <!--quero os 3 ret. alinhados no 
        X -> centro e y -. espaço apenas entre eles -->
        <div class="rectangle"></div>
        <div class="rectangle"></div>
        <div class="rectangle"></div>
    </div>
    <div id="circle">
    <!--x: final, y: espaço igualmente distribuídos-->
    <p>first</p>
    <p>second</p>
    <p>three</p>
    </div>
    
    

</body>
</html>
