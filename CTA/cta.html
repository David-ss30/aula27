<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        text-decoration: none;
        border: none;

         font-family: "Roboto", sans-serif;
         font-optical-sizing: auto;
    }
    section{
        width: 100%;
        height: 440px;
        padding: 112px 64px;
        text-align:left;
        
    }
    h1{
        font-size: 48px;
        font-weight: 700;
        margin-bottom: 24px;
    }
    p{
        font-size: 18px;
        font-weight: 400;
        margin-bottom: 32px;
        
    }
    .buttom{
        display: flex;
        gap: 16px;
        margin: 20px;
       
    }
    input{
        width: 394px;
        height: 48px;
        border: 2px solid black;
        
        
    }
    button{
        width: 103px;
        height: 48px;
        background-color: black;
        font-size: 16px; 
        font-weight: 400px;
        color: white;
        
    }
    
    footer{
        font-size: 12px;
        font-weight: 400;
        
        

    }

</style>
<body>
    <section>
        <h1>Lorem ipsum dolor sit amet.</h1>
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Animi, ullam corrupti consectetur maiores illo cum.</p>
        <div class="buttom">
        <input type="email" name="" id="" placeholder="Enter your email">
        <button>Sing up</button>
        </div>
        <footer>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quae incidunt illo quo deleniti in.</footer>
    </section>
</body>
</html>
